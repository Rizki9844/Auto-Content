name: Generate & Upload Coding Short

on:
  schedule:
    - cron: '0 8 * * *'    # Daily at 08:00 UTC
    - cron: '0 20 * * *'   # Daily at 20:00 UTC
  workflow_dispatch:         # Allow manual trigger from GitHub UI

concurrency:
  group: content-pipeline
  cancel-in-progress: false  # Don't cancel running pipelines

# ── Security: restrict permissions to minimum needed ──────
permissions:
  contents: write    # For git push (keep-alive commit)

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      CHANNEL_NAME: ${{ vars.CHANNEL_NAME || '@DevInSeconds' }}
      TTS_VOICE: ${{ vars.TTS_VOICE || 'en-US-GuyNeural' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      # ── Checkout repository ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 pinned SHA
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      # ── Set up Python ───────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0 pinned SHA
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── Install system dependencies ─────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      # ── Set up Node.js (for JS code execution in output_demo) ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Install Python packages ─────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Run the pipeline ────────────────────────────────────
      - name: Run content pipeline
        run: python -m src.main

      # ── Keep repository active (prevent schedule disable) ───
      - name: Keep repository active
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .last-run
          git add -f .last-run
          git diff --cached --quiet || {
            git commit -m "chore: pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          }
