name: Generate & Upload Coding Short

on:
  schedule:
    # ── 3x/day — optimized for US audience peak engagement ──
    # Semua waktu dalam UTC. Target utama: EST (UTC-5) & PST (UTC-8)
    #
    #   UTC 13:00  →  8 AM EST  /  5 AM PST   — morning commute
    #   UTC 18:00  →  1 PM EST  / 10 AM PST   — lunch break
    #   UTC 00:00  →  7 PM EST  /  4 PM PST   — prime time (evening)
    #
    - cron: '0 13 * * *'   # 8 AM EST — morning
    - cron: '0 18 * * *'   # 1 PM EST — lunch
    - cron: '0 0  * * *'   # 7 PM EST — prime time
    # Phase 8.2: Monthly maintenance — 3 AM UTC on the 1st of each month
    - cron: '0 3 1 * *'
  workflow_dispatch:         # Allow manual trigger from GitHub UI

concurrency:
  group: content-pipeline
  cancel-in-progress: false  # Don't cancel running pipelines

# ── Security: restrict permissions to minimum needed ──────
permissions:
  contents: write    # For git push (keep-alive commit)

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      CHANNEL_NAME: '@DevInSeconds'
      TTS_VOICE: en-US-GuyNeural
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ACTIVE_THEME: github_dark
      AUTO_ROTATE_THEMES: '0'
      ENABLE_THUMBNAILS: '0'
      ENABLE_YT_ANALYTICS: '0'
      CONTENT_LANGUAGE: 'en'   # set to 'id' or use secret for Indonesian series
      PROMPT_VARIANT: 'auto'     # 'A' | 'B' | 'auto' — Phase 6.5 A/B testing
      NARRATOR_TONE: 'auto'      # 'energetic'|'calm'|'curious'|'dramatic'|'auto'

    steps:
      # ── Checkout repository ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 pinned SHA
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      # ── Set up Python ───────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0 pinned SHA
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── Install system dependencies ─────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      # ── Set up Node.js (for JS code execution in output_demo) ──
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0 pinned SHA
        with:
          node-version: '20'

      # ── Install Python packages ─────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Run the pipeline ────────────────────────────────────
      - name: Run content pipeline
        run: python -m src.main

      # ── Phase 8.1: Self-healing health checks ──────────────
      - name: Run health monitor
        continue-on-error: true
        run: python -m src.main --health-monitor

      # ── Phase 8.2: Monthly maintenance (1st of each month) ─
      - name: Run monthly maintenance
        if: github.event.schedule == '0 3 1 * *'
        continue-on-error: true
        run: python -m src.main --maintenance

      # ── Refresh YouTube metrics (Phase 6.2) ─────────────────
      # Fetches view/like/AVD data for videos uploaded >48h ago.
      # To enable: set ENABLE_YT_ANALYTICS='1' and configure secrets
      # YOUTUBE_CHANNEL_ID + YOUTUBE_API_KEY, then uncomment env block.
      - name: Refresh YouTube metrics
        if: env.ENABLE_YT_ANALYTICS == '1'
        continue-on-error: true
        # env:
        #   YOUTUBE_CHANNEL_ID: $\{{ secrets.YOUTUBE_CHANNEL_ID }}
        #   YOUTUBE_API_KEY: $\{{ secrets.YOUTUBE_API_KEY }}
        run: python -m src.main --fetch-metrics

      # ── Keep repository active (prevent GitHub auto-disabling scheduled workflows) ───
      # GitHub disables cron workflows after 60 days of no repo activity.
      # This step makes an empty commit only when needed (no file changes).
      - name: Keep repository active
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase origin main || true
          # Only push a keep-alive if the last real commit is older than 50 days
          LAST_COMMIT_DATE=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DAYS_SINCE=$(( (NOW - LAST_COMMIT_DATE) / 86400 ))
          if [ "$DAYS_SINCE" -ge 50 ]; then
            git commit --allow-empty -m "chore: keep-alive (${DAYS_SINCE} days since last commit)"
            git push || echo "::warning::Keep-alive push failed (non-critical)"
          else
            echo "Last commit was ${DAYS_SINCE} days ago — no keep-alive needed"
          fi
