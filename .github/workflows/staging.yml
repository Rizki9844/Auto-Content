name: Staging Pipeline — Test Environment

on:
  workflow_dispatch:   # Manual trigger only from GitHub UI
    inputs:
      content_language:
        description: 'Content language (en/id)'
        required: false
        default: 'en'

concurrency:
  group: staging-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # ── Staging-specific settings ──────────────────────
      ENVIRONMENT: staging

      # ── API keys (override per-environment in GitHub Settings) ──
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      MONGODB_URI: ${{ secrets.MONGODB_URI }}

      # ── YouTube channel (override in staging environment) ──
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

      CHANNEL_NAME: '@DevInSeconds-Staging'
      TTS_VOICE: en-US-GuyNeural
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ACTIVE_THEME: github_dark
      AUTO_ROTATE_THEMES: '0'
      ENABLE_THUMBNAILS: '0'
      ENABLE_YT_ANALYTICS: '0'
      CONTENT_LANGUAGE: ${{ github.event.inputs.content_language || 'en' }}
      PROMPT_VARIANT: 'auto'
      NARRATOR_TONE: 'auto'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run staging pipeline
        run: python -m src.main

      - name: Show staging result
        if: always()
        run: |
          echo "🧪 Staging pipeline completed"
          echo "Environment: staging"
          echo "Videos will have [STAGING] prefix in title"
