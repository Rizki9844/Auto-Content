# ──────────────────────────────────────────────────────────────
#  CI — Lint, compile-check, and test on every push / PR
# ──────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ── Python ──────────────────────────────────────────────
      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.13'
          cache: 'pip'

      # ── Install dependencies ────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      # ── Step 1: Compile check ──────────────────────────────
      - name: Compile check (all .py files)
        run: python -m py_compile src/*.py

      # ── Step 2: Ruff linter ─────────────────────────────────
      - name: Ruff lint
        run: ruff check src/ tests/ --output-format=github

      # ── Step 3: Unit tests ──────────────────────────────────
      - name: Run tests
        env:
          GEMINI_API_KEY: "test-fake-key"
          MONGODB_URI: ""
        run: |
          pytest tests/ \
            -v --tb=long \
            -m "not integration" \
            --cov=src --cov-report=term-missing \
            --junitxml=test-results.xml \
          || true

      # ── Show failed tests as annotations ────────────────────
      - name: Report test failures
        if: always()
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('test-results.xml')
          root = tree.getroot()
          failures = []
          for tc in root.iter('testcase'):
              fail = tc.find('failure')
              if fail is not None:
                  name = f\"{tc.get('classname')}.{tc.get('name')}\"
                  msg = (fail.text or '')[:500]
                  failures.append((name, msg))
          if failures:
              for name, msg in failures:
                  print(f'::error::{name}')
                  for line in msg.strip().split(chr(10)):
                      print(f'  {line}')
              print(f'::error::Total test failures: {len(failures)}')
              sys.exit(1)
          else:
              print('All tests passed!')
          "

      # ── Upload test results (optional, for PR annotations) ──
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: test-results
          path: test-results.xml
