name: Upload Queue — Publish Scheduled Videos

on:
  schedule:
    # ── Run at same peak times as generate.yml ───────────────
    # Jobs in the queue are uploaded when publish_at <= now.
    #
    #   UTC 13:00  →  8 AM EST  /  5 AM PST   — morning
    #   UTC 18:00  →  1 PM EST  / 10 AM PST   — lunch
    #   UTC 00:00  →  7 PM EST  /  4 PM PST   — prime time
    #
    - cron: '0 13 * * *'
    - cron: '0 18 * * *'
    - cron: '0 0  * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

concurrency:
  group: upload-queue
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  upload-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      CHANNEL_NAME: '@DevInSeconds'
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ACTIVE_THEME: github_dark
      AUTO_ROTATE_THEMES: '0'
      ENABLE_THUMBNAILS: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Upload due jobs from queue
        run: python -m src.main --upload-queue
